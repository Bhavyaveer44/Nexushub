<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dashboard - WhatsApp Conversations</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const CRMDashboard = () => {
      const [conversations, setConversations] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedConversation, setSelectedConversation] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');

      // Fetch data from API
      React.useEffect(() => {
        const fetchData = async () => {
          try {
            const response = await fetch('/api/crm-data');
            if (!response.ok) {
              throw new Error('Failed to fetch data');
            }
            const data = await response.json();
            setConversations(data.conversations || {});
            // Set first conversation as selected if available
            const conversationIds = Object.keys(data.conversations || {});
            if (conversationIds.length > 0) {
              setSelectedConversation(conversationIds[0]);
            }
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        fetchData();
      }, []);

      // Color coding for lead status
      const getStatusColor = (status) => {
        switch (status) {
          case 'hot': return 'bg-red-100 text-red-800 border-red-200';
          case 'warm': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
          case 'cold': return 'bg-gray-100 text-gray-800 border-gray-200';
          default: return 'bg-gray-100 text-gray-800 border-gray-200';
        }
      };

      const getStatusIcon = (status) => {
        switch (status) {
          case 'hot': return '🔥';
          case 'warm': return '🌡️';
          case 'cold': return '❄️';
          default: return '📋';
        }
      };

      // Filter and sort conversations
      const filteredConversations = useMemo(() => {
        let filtered = Object.entries(conversations);

        // Filter by status
        if (statusFilter !== 'all') {
          filtered = filtered.filter(([_, data]) => data.lead_status === statusFilter);
        }

        // Filter by search term
        if (searchTerm) {
          filtered = filtered.filter(([id, data]) =>
            id.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (data.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
            data.summary.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }

        // Sort: HOT first, then WARM, then COLD
        return filtered.sort(([_, a], [__, b]) => {
          const order = { hot: 0, warm: 1, cold: 2 };
          return order[a.lead_status] - order[b.lead_status];
        });
      }, [conversations, statusFilter, searchTerm]);

      const selectedData = conversations[selectedConversation];

      // Loading state
      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen">
            <div className="text-center">
              <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
              <p className="text-gray-600">Loading CRM data...</p>
            </div>
          </div>
        );
      }

      // Error state
      if (error) {
        return (
          <div className="flex items-center justify-center h-screen">
            <div className="text-center">
              <div className="text-red-500 text-xl mb-4">⚠️</div>
              <p className="text-gray-600">Error loading data: {error}</p>
              <button
                onClick={() => window.location.reload()}
                className="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
              >
                Retry
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex min-h-screen flex-col md:flex-row bg-gray-50">
          {/* Left Panel - Conversation List */}
          <div className="w-full md:w-1/3 bg-white border-b border-gray-200 md:border-b-0 md:border-r flex flex-col">
            {/* Header */}
            <div className="p-4 md:p-6 border-b border-gray-200">
              <h1 className="text-xl md:text-2xl font-bold text-gray-900 mb-4">CRM Dashboard</h1>

              {/* Search */}
              <div className="mb-4">
                <input
                  type="text"
                  placeholder="Search conversations..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
              </div>

              {/* Status Filter */}
              <div className="flex flex-wrap gap-2">
                {['all', 'hot', 'warm', 'cold'].map(status => (
                  <button
                    key={status}
                    onClick={() => setStatusFilter(status)}
                    className={`px-3 py-1 rounded-full text-sm font-medium capitalize transition-colors ${
                      statusFilter === status
                        ? 'bg-blue-100 text-blue-800 border-blue-200'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }`}
                  >
                    {status}
                  </button>
                ))}
              </div>
            </div>

            {/* Conversation List */}
            <div className="flex-1 overflow-y-auto">
              {filteredConversations.map(([id, data]) => (
                <div
                  key={id}
                  onClick={() => setSelectedConversation(id)}
                  className={`p-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors ${
                    selectedConversation === id ? 'bg-blue-50 border-l-4 border-l-blue-500' : ''
                  }`}
                >
                  <div className="flex items-center justify-between mb-2">
                    <div className="min-w-0">
                      <p className="font-medium text-gray-900 truncate">{data.name || id}</p>
                      <p className="text-xs text-gray-500 truncate">{id}</p>
                    </div>
                    <span className={`px-2 py-1 rounded-full text-xs font-medium border ${getStatusColor(data.lead_status)}`}>
                      {getStatusIcon(data.lead_status)} {data.lead_status}
                    </span>
                  </div>
                  <p className="text-sm text-gray-600 line-clamp-2">{data.summary}</p>
                  <div className="mt-2 flex items-center text-xs text-gray-500">
                    <span className="mr-3">Next: {data.next_steps.length}</span>
                    <span>Req: {data.customer_requirements.length}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Right Panel - Conversation Details */}
          <div className="w-full md:flex-1 flex flex-col">
            {selectedData ? (
              <div className="flex-1 overflow-y-auto">
                {/* Header */}
                <div className="bg-white border-b border-gray-200 p-4 md:p-6">
                  <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>
                      <h2 className="text-lg md:text-xl font-semibold text-gray-900">{selectedData.name || selectedConversation}</h2>
                      <p className="text-sm text-gray-500">{selectedConversation}</p>
                    </div>
                    <span className={`px-3 py-1 rounded-full text-sm font-medium border ${getStatusColor(selectedData.lead_status)}`}>
                      {getStatusIcon(selectedData.lead_status)} {selectedData.lead_status.toUpperCase()}
                    </span>
                  </div>
                </div>

                {/* Content */}
                <div className="p-6 space-y-6">
                  {/* Summary */}
                  <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-3 flex items-center">
                      <span className="mr-2">📝</span>
                      Summary
                    </h3>
                    <p className="text-gray-700 leading-relaxed">{selectedData.summary}</p>
                  </div>

                  {/* Customer Requirements */}
                  <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-3 flex items-center">
                      <span className="mr-2">👤</span>
                      Customer Requirements
                    </h3>
                    {selectedData.customer_requirements.length > 0 ? (
                      <ul className="space-y-2">
                        {selectedData.customer_requirements.map((req, index) => (
                          <li key={index} className="flex items-start">
                            <span className="inline-block w-2 h-2 bg-blue-500 rounded-full mt-2 mr-3 flex-shrink-0"></span>
                            <span className="text-gray-700">{req}</span>
                          </li>
                        ))}
                      </ul>
                    ) : (
                      <p className="text-gray-500 italic">No customer requirements recorded</p>
                    )}
                  </div>

                  {/* Business Requirements */}
                  <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-3 flex items-center">
                      <span className="mr-2">🏢</span>
                      Business Requirements
                    </h3>
                    {selectedData.business_requirements.length > 0 ? (
                      <ul className="space-y-2">
                        {selectedData.business_requirements.map((req, index) => (
                          <li key={index} className="flex items-start">
                            <span className="inline-block w-2 h-2 bg-green-500 rounded-full mt-2 mr-3 flex-shrink-0"></span>
                            <span className="text-gray-700">{req}</span>
                          </li>
                        ))}
                      </ul>
                    ) : (
                      <p className="text-gray-500 italic">No business requirements recorded</p>
                    )}
                  </div>

                  {/* Next Steps */}
                  <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-3 flex items-center">
                      <span className="mr-2">📋</span>
                      Next Steps
                    </h3>
                    {selectedData.next_steps.length > 0 ? (
                      <div className="space-y-3">
                        {selectedData.next_steps.map((step, index) => (
                          <div key={index} className="flex items-start p-3 bg-gray-50 rounded-lg">
                            <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium mr-3 ${
                              step.owner === 'business'
                                ? 'bg-blue-100 text-blue-800'
                                : 'bg-green-100 text-green-800'
                            }`}>
                              {step.owner === 'business' ? '🏢' : '👤'}
                            </div>
                            <div className="flex-1">
                              <p className="text-gray-900 font-medium">{step.action}</p>
                              <span className={`inline-block mt-1 px-2 py-1 text-xs font-medium rounded-full ${
                                step.owner === 'business'
                                  ? 'bg-blue-100 text-blue-800'
                                  : 'bg-green-100 text-green-800'
                              }`}>
                                {step.owner}
                              </span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <p className="text-gray-500 italic">No next steps defined</p>
                    )}
                  </div>
                  {/* Key Entities */}
                  <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <h3 className="text-lg font-semibold text-gray-900 mb-3 flex items-center">
                      <span className="mr-2">📋</span>
                      Key Entities
                    </h3>
                    {selectedData.key_entities && Object.keys(selectedData.key_entities).length > 0 ? (
                      <div className="space-y-3">
                        {Object.entries(selectedData.key_entities).map(([key, value], index) => (
                          <li key={key} className="flex items-start">
                            <span className="inline-block w-2 h-2 bg-blue-500 rounded-full mt-2 mr-3 flex-shrink-0"></span>
                            <span className="text-gray-700">{key} : {value}</span>
                          </li>
                        ))}
                      </div>
                    ) : (
                      <p className="text-gray-500 italic">No Key Entities defined</p>
                    )}
                  </div>
                </div>
              </div>
            ) : (
              <div className="flex-1 flex items-center justify-center">
                <div className="text-center">
                  <div className="text-6xl mb-4">📊</div>
                  <h3 className="text-xl font-semibold text-gray-900 mb-2">Select a Conversation</h3>
                  <p className="text-gray-600">Choose a conversation from the list to view details</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // Render the component
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CRMDashboard />);
  </script>
</body>
</html>
